<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Special Invitation ❤️</title>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#ffd6e0,#ffeef5);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    overflow-x:hidden;
}

.card{
    background:white;
    width:90%;
    max-width:450px;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
}

img{
    width:250px;
    height:250px;
    object-fit:cover;
    border-radius:20px;
    margin-bottom:15px;
}

h1{
    color:#ff4d6d;
    font-size: 24px;
}

button{
    border:none;
    border-radius:12px;
    padding:12px 24px;
    margin:8px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

.yes-btn {
    background:#4CAF50;
    color:white;
}

.no-btn {
    background:#f44336;
    color:white;
}

input[type="date"]{
    padding:10px;
    font-size:16px;
    border-radius:10px;
    border:1px solid #ccc;
}

.confetti{
    position:fixed;
    width:10px;
    height:10px;
    top:-20px;
    animation:fall 4s linear forwards;
    z-index: 999;
}

@keyframes fall{
    to{
        transform:translateY(110vh) rotate(720deg);
    }
}
</style>

<script>
(function(){
    // Siguraduhing palitan ito ng totoong Public Key mo mula sa EmailJS dashboard
    emailjs.init({
        publicKey: "c2zS-SX0xFXHPRgIn" 
    });
})();
</script>

</head>
<body>

<div class="card" id="card">
    <h1>Hi Jaymee 😊</h1>
    <img src="https://imgflip.com/memetemplate/419219168/cute-cat-with-flower" alt="Cute Cat">
    <p>I have something to ask.... ❤️</p>
    <button class="yes-btn" onclick="start()">Continue</button>
</div>

<script>
let yesSize = 18; 

function start(){
    document.getElementById("card").innerHTML = `
        <h1>Would you like to hang out with me after class, or on a day that you're free? 😊❤️</h1>
        <img src="https://imgflip.com/memetemplate/Smiling-Cat" alt="Cute Cat">
        <p>I have been wanting to ask you this for a while. 😊</p>
        <button class="yes-btn" id="yesBtn" onclick="showDatePicker()">Yes ❤️</button>
        <button class="no-btn" id="noBtn" onclick="increaseYesSize()">No 🙈</button>
    `;
    yesSize = 18; 
}

function increaseYesSize(){
    yesSize += 10; 
    const yesBtn = document.getElementById("yesBtn");
    if(yesBtn) {
        yesBtn.style.fontSize = yesSize + "px";
        yesBtn.style.padding = (yesSize/1.5) + "px " + (yesSize * 1.3) + "px";
    }
    
    if(yesSize >= 48) {
        confirmNo();
    }
}

function confirmNo(){
    document.getElementById("card").innerHTML = `
        <h1>Are you sure? 🥺</h1>
        <img src="https://imgflip.com/memetemplate/Shrek-Cat" alt="Sad Cat">
        <p>Think carefully before making the cats sad.</p>
        <button class="no-btn" onclick="showSadCat()">Yes, I'm sure 😔</button>
        <button class="yes-btn" onclick="start()">No, wait 🥺</button>
    `;
}

function showSadCat(){
    document.getElementById("card").innerHTML = `
        <h1>The cat is sad now 😿</h1>
        <img src="https://imgflip.com/memetemplate/42003405/Crying-cat" alt="Very Sad Cat">
        <p>The cats were hoping you'd say yes.</p>
        <p>But thank you for being honest ❤️</p>
    `;
}

function showDatePicker(){
    confettiEffect();
    document.getElementById("card").innerHTML = `
        <h1>Yay! 🎉</h1>
        <img src="https://imgflip.com/memetemplate/26675635/Funny-Cat-Birthday" alt="Happy Cat">
        <p>You just made my day. ❤️</p>
        <p>I'd love to spend some time with you. 😊</p>
        <p>When would you like us to go on our date?</p>
        <input type="date" id="datePicker">
        <br><br>
        <button class="yes-btn" onclick="confirmDate()">Choose This Date ❤️</button>
    `;
}

function confirmDate(){
    const selectedDate = document.getElementById("datePicker").value;

    if(!selectedDate){
        alert("Please choose a date first 😊");
        return;
    }

    emailjs.send(
        "chrisnel885",
        "template_xmpfzyj",
        {
            selected_date: selectedDate
        }
    )
    .then(() => {
        showFinalThankYou(selectedDate, "Thank You ❤️");
    })
    .catch(() => {
        showFinalThankYou(selectedDate, "Thank You Aemie ❤️");
    });
}

function showFinalThankYou(date, headlineText){
    confettiEffect();
    document.getElementById("card").innerHTML = `
        <h1>${headlineText}</h1>
        <img src="https://imgflip.com/memetemplate/482522666/jumping-kitten" alt="Sweet Cat">
        <p>Date selected: <strong>${date}</strong></p>
        <p>Looking forward to seeing you. 😊</p>
    `;
}

function confettiEffect(){
    for(let i=0;i<80;i++){
        const c = document.createElement("div");
        c.classList.add("confetti");
        c.style.left = Math.random()*100 + "vw";
        c.style.background = `hsl(${Math.random()*360},100%,50%)`;
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 4000);
    }
}
</script>

</body>
</html>
